<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>test</title><style>:root{--c-primary:#185FA5;--c-primary-light:#E8F1FB;--border:#E2E8F0;--text-muted:#6B7280;--c-success:#3B6D11;--c-success-light:#EAF3DE;}*{box-sizing:border-box;}body{font-family:"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;background:#F7F9FC;margin:0;padding:24px 16px;color:#1F2937;}.container{max-width:640px;margin:0 auto;}.header{background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;border:1px solid var(--border);}.header h1{font-size:18px;margin:0 0 8px;color:var(--c-primary);}.header p{font-size:13px;color:var(--text-muted);line-height:1.7;white-space:pre-wrap;margin:0;}.form-card{background:#fff;border-radius:12px;padding:24px;border:1px solid var(--border);}.q-block{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}.q-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}.q-label{display:block;font-size:14px;font-weight:600;margin-bottom:10px;}.q-input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;resize:vertical;}.opt-group,.rating-group{display:flex;flex-direction:column;gap:8px;}.rating-group{flex-direction:row;justify-content:space-between;}.opt-item,.rating-opt{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;font-size:13px;}.rating-opt{flex-direction:column;flex:1;text-align:center;padding:12px 4px;}.opt-item:hover,.rating-opt:hover{background:var(--c-primary-light);}.opt-item input,.rating-opt input{margin:0;}.rating-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);margin-top:4px;}.submit-btn{width:100%;padding:14px;background:var(--c-primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;margin-top:20px;}.submit-btn:disabled{background:#A0AEC0;cursor:not-allowed;}.submit-btn:hover:not(:disabled){background:#0C447C;}.status-msg{text-align:center;padding:40px 20px;}.status-msg.success{color:var(--c-success);}.status-msg.error{color:#D14343;}.status-msg.info{color:var(--c-primary);}.login-btn{display:block;width:100%;padding:14px;background:var(--c-primary);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;}.device-code-box{background:var(--c-primary-light);border-radius:8px;padding:20px;text-align:center;margin-top:14px;}.device-code{font-size:28px;font-weight:700;letter-spacing:4px;color:var(--c-primary);margin:8px 0;}.device-link{display:inline-block;margin-top:10px;padding:10px 24px;background:var(--c-primary);color:#fff;border-radius:6px;text-decoration:none;font-size:14px;font-weight:600;}.device-waiting{font-size:12px;color:var(--text-muted);margin-top:12px;}</style></head><body><div class="container"><div class="header"><h1>test</h1><p></p></div><div class="form-card" id="form-card"><div id="login-section"><p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">回答にはMicrosoft 365アカウントでのログインが必要です。</p><button class="login-btn" id="login-btn">Microsoft 365でログインして回答する</button><div id="device-code-section" class="device-code-box" style="display:none;"><div style="font-size:13px;color:var(--text-muted);">下のコードをコピーし、ボタンを押して表示されるページで入力してください。</div><div class="device-code" id="device-code-text">----</div><a href="https://microsoft.com/devicelogin" target="_blank" rel="noopener" class="device-link">ログインページを開く</a><div class="device-waiting" id="device-waiting-text">ログイン完了を待っています...</div></div></div><div id="form-section" style="display:none;"><div class="q-block"><label class="q-label">Q1. test</label><textarea class="q-input" data-qid="q_1781752668603_hzac" data-qtype="text" rows="3" placeholder="回答を入力してください"></textarea></div><button class="submit-btn" id="submit-btn">回答を送信する</button></div><div id="status-section" style="display:none;"></div></div></div><script>const SURVEY_ID = "survey_1781752684648";
const SP_CONFIG = {"clientId":"313ac5f9-2f4d-4e4d-ac06-f0948e6efd1a","tenantId":"d627f39c-6dbe-4d90-b1d2-f90f9af49f7d","siteUrl":"https://alcgp.sharepoint.com/sites/test629","listName":"人事情報管理ツール"};
const QUESTIONS = [{"id":"q_1781752668603_hzac","type":"text","text":"test","options":[]}];

let accessToken = null;
let currentUserInfo = null;
let pollTimer = null;

function startLogin() {
  document.getElementById('login-btn').style.display = 'none';
  requestDeviceCode();
}

async function requestDeviceCode() {
  try {
    const scope = 'User.Read Sites.ReadWrite.All offline_access';
    const body = new URLSearchParams({
      client_id: SP_CONFIG.clientId,
      scope: scope
    });
    const res = await fetch('https://login.microsoftonline.com/' + SP_CONFIG.tenantId + '/oauth2/v2.0/devicecode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: body
    });
    if (!res.ok) throw new Error('デバイスコードの取得に失敗しました: ' + await res.text());
    const data = await res.json();

    document.getElementById('device-code-section').style.display = 'block';
    document.getElementById('device-code-text').textContent = data.user_code;

    pollForToken(data.device_code, data.interval || 5);
  } catch(e) {
    showStatus('error', e.message);
  }
}

function pollForToken(deviceCode, intervalSec) {
  const waitingEl = document.getElementById('device-waiting-text');
  pollTimer = setInterval(async function() {
    try {
      const body = new URLSearchParams({
        grant_type: 'urn:ietf:params:oauth:grant-type:device_code',
        client_id: SP_CONFIG.clientId,
        device_code: deviceCode
      });
      const res = await fetch('https://login.microsoftonline.com/' + SP_CONFIG.tenantId + '/oauth2/v2.0/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body
      });
      const data = await res.json();

      if (res.ok && data.access_token) {
        clearInterval(pollTimer);
        accessToken = data.access_token;
        sessionStorage.setItem('survey_access_token', accessToken);
        if (waitingEl) waitingEl.textContent = 'ログインが完了しました。';
        await verifyTokenAndShowForm();
        return;
      }

      if (data.error === 'authorization_pending') {
        return;
      }
      if (data.error === 'authorization_declined') {
        clearInterval(pollTimer);
        showStatus('error', 'ログインがキャンセルされました。もう一度お試しください。');
        return;
      }
      if (data.error === 'expired_token') {
        clearInterval(pollTimer);
        showStatus('error', 'コードの有効期限が切れました。もう一度お試しください。');
        return;
      }
      if (data.error) {
        clearInterval(pollTimer);
        showStatus('error', 'ログインエラー: ' + (data.error_description || data.error));
      }
    } catch(e) {
      // 一時的な通信エラーは継続してポーリング
      console.warn('ポーリング中にエラー:', e);
    }
  }, intervalSec * 1000);
}

async function verifyTokenAndShowForm() {
  try {
    const userRes = await fetch('https://graph.microsoft.com/v1.0/me', {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    if (!userRes.ok) throw new Error('認証期限切れ');
    currentUserInfo = await userRes.json();
    showForm();
  } catch(e) {
    sessionStorage.removeItem('survey_access_token');
    accessToken = null;
    showStatus('error', 'ログイン確認に失敗しました。もう一度お試しください。');
  }
}

async function init() {
  if (!SP_CONFIG.clientId) {
    showStatus('error', 'このフォームは正しく設定されていません。管理者にお問い合わせください。');
    return;
  }

  accessToken = sessionStorage.getItem('survey_access_token');

  if (accessToken) {
    await verifyTokenAndShowForm();
  } else {
    document.getElementById('login-btn').addEventListener('click', startLogin);
  }
}

function showForm() {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('status-section').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('submit-btn').addEventListener('click', submitSurvey);
}

function showStatus(type, message) {
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('form-section').style.display = 'none';
  const el = document.getElementById('status-section');
  el.style.display = 'block';
  el.className = 'status-msg ' + type;
  el.textContent = message;
}

function collectAnswers() {
  const answers = {};
  QUESTIONS.forEach(function(q) {
    if (q.type === 'text') {
      const el = document.querySelector('textarea[data-qid="' + q.id + '"]');
      answers[q.id] = { question: q.text, answer: el ? el.value.trim() : '' };
    } else if (q.type === 'rating' || q.type === 'single') {
      const checked = document.querySelector('input[name="' + q.id + '"]:checked');
      answers[q.id] = { question: q.text, answer: checked ? checked.value : '' };
    } else if (q.type === 'multi') {
      const checkedEls = document.querySelectorAll('input[name="' + q.id + '"]:checked');
      const checked = [];
      checkedEls.forEach(function(c) { checked.push(c.value); });
      answers[q.id] = { question: q.text, answer: checked.join('、') };
    }
  });
  return answers;
}

function buildListsUrl(siteId, displayName) {
  return 'https://graph.microsoft.com/v1.0/sites/' + siteId + '/lists?' + '$filter=displayName eq ' + encodeURIComponent("'" + displayName + "'");
}

async function submitSurvey() {
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '送信中...';

  const answers = collectAnswers();

  try {
    const siteUrlObj = new URL(SP_CONFIG.siteUrl);
    const siteHostname = siteUrlObj.hostname;
    const sitePath = siteUrlObj.pathname;
    const siteRes = await fetch('https://graph.microsoft.com/v1.0/sites/' + siteHostname + ':' + sitePath, {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const siteData = await siteRes.json();
    const siteId = siteData.id;

    const responseListName = SP_CONFIG.listName + '_アンケート回答';
    const listsRes = await fetch(buildListsUrl(siteId, responseListName), {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const listsData = await listsRes.json();
    if (!listsData.value.length) throw new Error('回答リストが見つかりません');
    const listId = listsData.value[0].id;

    const userEmail = (currentUserInfo.mail || currentUserInfo.userPrincipalName || '').toLowerCase();
    const empListRes = await fetch(buildListsUrl(siteId, SP_CONFIG.listName), {
      headers: { Authorization: 'Bearer ' + accessToken }
    });
    const empListData = await empListRes.json();
    let empId = '';
    let empName = currentUserInfo.displayName || '';

    if (empListData.value.length) {
      const empListId = empListData.value[0].id;
      const empItemsRes = await fetch('https://graph.microsoft.com/v1.0/sites/' + siteId + '/lists/' + empListId + '/items?expand=fields(select=EmpID,NameKanji,Email)&' + '$top=999', {
        headers: { Authorization: 'Bearer ' + accessToken }
      });
      const empItemsData = await empItemsRes.json();
      const matched = empItemsData.value.find(function(item) {
        return (item.fields.Email || '').toLowerCase() === userEmail;
      });
      if (matched) {
        empId = matched.fields.EmpID || '';
        empName = matched.fields.NameKanji || empName;
      }
    }

    const fields = {
      SurveyId: SURVEY_ID,
      EmpID: empId,
      EmpName: empName,
      AnswersJson: JSON.stringify(answers),
      SubmittedAt: new Date().toISOString()
    };

    const postRes = await fetch('https://graph.microsoft.com/v1.0/sites/' + siteId + '/lists/' + listId + '/items', {
      method: 'POST',
      headers: { Authorization: 'Bearer ' + accessToken, 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: fields })
    });
    if (!postRes.ok) throw new Error(await postRes.text());

    showStatus('success', '回答ありがとうございました。送信が完了しました。');
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '回答を送信する';
    showStatus('error', '送信エラー: ' + e.message);
  }
}

init();
</script></body></html>
