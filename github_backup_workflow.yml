# ============================================================
# HR管理ツール SharePoint 自動バックアップ
# 実行環境: GitHub Actions (Ubuntu latest)
# 認証: Azure AD アプリ認証（Client Credentials Flow）
# ============================================================
# 配置先: .github/workflows/backup.yml
# 必要なGitHub Secrets:
#   - AZURE_TENANT_ID
#   - AZURE_CLIENT_ID
#   - AZURE_CLIENT_SECRET
#   - SP_SITE_URL
#   - SP_LIST_NAME
#   - TEAMS_WEBHOOK_URL  (任意)
#   - BACKUP_FOLDER_PATH (任意・SharePoint Library保存時)
# ============================================================

name: HR SharePoint Backup

on:
  # 毎日 JST 02:00 = UTC 17:00 (前日)
  schedule:
    - cron: '0 17 * * *'

  # 手動実行も可能
  workflow_dispatch:
    inputs:
      reason:
        description: '実行理由（任意）'
        required: false
        default: '手動バックアップ'

jobs:
  backup:
    name: SharePoint データバックアップ
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 リポジトリのチェックアウト
        uses: actions/checkout@v4

      - name: 🔧 PowerShell Core セットアップ
        shell: bash
        run: |
          # PowerShell Core は Ubuntu に標準搭載済み
          pwsh --version

      - name: 💾 バックアップ実行
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SP_SITE_URL: ${{ secrets.SP_SITE_URL }}
          SP_LIST_NAME: ${{ secrets.SP_LIST_NAME }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          BACKUP_FOLDER: ${{ github.workspace }}/backup-output
        run: |
          ./scripts/Backup-HrSharePointData-Cloud.ps1

      - name: 📊 バックアップサマリーを表示
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "${{ github.workspace }}/backup-output/backup-status.json") {
            $status = Get-Content "${{ github.workspace }}/backup-output/backup-status.json" -Raw | ConvertFrom-Json
            Write-Host "================================================"
            Write-Host "📊 バックアップサマリー"
            Write-Host "================================================"
            Write-Host "ステータス: $($status.Status)"
            Write-Host "総アイテム数: $($status.TotalItems)"
            Write-Host "対象リスト数: $($status.Lists.Count)"
            Write-Host "エラー数: $($status.Errors.Count)"
            Write-Host "所要時間: $($status.DurationSec) 秒"
            Write-Host "================================================"
          }

      - name: 📦 バックアップファイルをアーティファクトに保存
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: hr-backup-${{ github.run_id }}
          path: backup-output/
          retention-days: 90
          compression-level: 6

      - name: 📤 SharePoint Document Library へアップロード（任意）
        if: success() && env.BACKUP_FOLDER_PATH != ''
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SP_SITE_URL: ${{ secrets.SP_SITE_URL }}
          BACKUP_FOLDER_PATH: ${{ secrets.BACKUP_FOLDER_PATH }}
        shell: pwsh
        run: |
          ./scripts/Upload-ToSharePoint.ps1 -SourceFolder "${{ github.workspace }}/backup-output"

      - name: 🚨 失敗時のTeams通知
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        shell: pwsh
        run: |
          if (-not $env:TEAMS_WEBHOOK_URL) { exit 0 }
          $payload = @{
            '@type' = 'MessageCard'
            '@context' = 'https://schema.org/extensions'
            themeColor = 'DC3545'
            summary = 'HR バックアップ失敗'
            sections = @(@{
              activityTitle = '🚨 HR SharePoint バックアップ失敗'
              activitySubtitle = "GitHub Actions / $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')"
              text = "GitHub Actions でのバックアップが失敗しました。詳細は実行ログをご確認ください。"
              facts = @(
                @{ name = 'リポジトリ'; value = $env:REPO }
                @{ name = 'Run ID'; value = $env:RUN_ID }
                @{ name = 'ログURL'; value = "https://github.com/$env:REPO/actions/runs/$env:RUN_ID" }
              )
              markdown = $true
            })
          } | ConvertTo-Json -Depth 10
          try {
            Invoke-RestMethod -Uri $env:TEAMS_WEBHOOK_URL -Method POST -Body $payload -ContentType 'application/json'
          } catch {
            Write-Warning "Teams通知失敗: $($_.Exception.Message)"
          }
