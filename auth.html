<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アンケート認証</title>
<style>
  body { font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background:#F7F9FC; margin:0; padding:0; display:flex; align-items:center; justify-content:center; height:100vh; }
  .box { background:#fff; border-radius:12px; padding:32px; border:1px solid #E2E8F0; text-align:center; max-width:360px; }
  .spinner { border:3px solid #E2E8F0; border-top-color:#185FA5; width:32px; height:32px; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #status { font-size:13px; color:#6B7280; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner"></div>
  <div id="status">読み込み中...</div>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const code = params.get('code');

function base64url(buf) {
  return btoa(String.fromCharCode.apply(null, new Uint8Array(buf))).replace(/[+]/g,'-').replace(/[/]/g,'_').replace(/[=]/g,'');
}
async function generatePKCE() {
  const array = new Uint8Array(32);
  crypto.getRandomValues(array);
  const verifier = base64url(array);
  const data = new TextEncoder().encode(verifier);
  const digest = await crypto.subtle.digest('SHA-256', data);
  const challenge = base64url(digest);
  return { verifier: verifier, challenge: challenge };
}

function getSelfUrl() {
  const loc = window.location;
  return loc.protocol + '//' + loc.host + loc.pathname;
}

async function exchangeCodeForToken(clientId, tenantId, authCode) {
  const verifier = sessionStorage.getItem('auth_pkce_verifier');
  const redirectUri = getSelfUrl();
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: 'authorization_code',
    code: authCode,
    redirect_uri: redirectUri,
    code_verifier: verifier
  });
  const res = await fetch('https://login.microsoftonline.com/' + tenantId + '/oauth2/v2.0/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: body
  });
  if (!res.ok) throw new Error('認証失敗: ' + await res.text());
  return res.json();
}

async function init() {
  const statusEl = document.getElementById('status');

  if (code) {
    // 認証コード受け取り：トークン交換して元の回答フォームに戻る
    try {
      const cfgJson = sessionStorage.getItem('auth_cfg');
      const returnUrl = sessionStorage.getItem('auth_return_url');
      if (!cfgJson || !returnUrl) {
        statusEl.textContent = 'セッション情報が見つかりません。アンケートのリンクから再度開いてください。';
        return;
      }
      const cfg = JSON.parse(cfgJson);
      const tokenData = await exchangeCodeForToken(cfg.clientId, cfg.tenantId, code);

      sessionStorage.removeItem('auth_pkce_verifier');
      sessionStorage.removeItem('auth_cfg');
      sessionStorage.removeItem('auth_return_url');

      statusEl.textContent = 'ログインが完了しました。画面を移動します...';

      const sep = returnUrl.indexOf('#') >= 0 ? '&' : '#';
      window.location.href = returnUrl + sep + 'access_token=' + encodeURIComponent(tokenData.access_token);
    } catch(e) {
      statusEl.textContent = 'ログインエラー: ' + e.message;
    }
    return;
  }

  // 初回アクセス：sessionStorageに保存された設定でログイン開始
  try {
    const cfgJson = sessionStorage.getItem('auth_cfg');
    const returnUrl = sessionStorage.getItem('auth_return_url');
    if (!cfgJson || !returnUrl) {
      statusEl.textContent = 'このページは直接開けません。アンケートのメールに記載されたリンクからアクセスしてください。';
      return;
    }
    const cfg = JSON.parse(cfgJson);
    statusEl.textContent = 'Microsoft 365にログイン中...';

    const pkce = await generatePKCE();
    sessionStorage.setItem('auth_pkce_verifier', pkce.verifier);

    const redirectUri = encodeURIComponent(getSelfUrl());
    const scope = encodeURIComponent('User.Read Sites.ReadWrite.All offline_access');
    const url = 'https://login.microsoftonline.com/' + cfg.tenantId + '/oauth2/v2.0/authorize'
      + '?client_id=' + cfg.clientId
      + '&response_type=code'
      + '&redirect_uri=' + redirectUri
      + '&response_mode=query'
      + '&scope=' + scope
      + '&code_challenge=' + pkce.challenge
      + '&code_challenge_method=S256';
    window.location.href = url;
  } catch(e) {
    statusEl.textContent = '設定エラー: ' + e.message;
  }
}

init();

</script>
</body>
</html>
